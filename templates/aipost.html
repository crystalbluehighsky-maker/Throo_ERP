<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>쓰루(Throo) AI 전표 입력 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; }
        .selected-row { background-color: #e0e7ff !important; outline: 2px solid #6366f1; }
        .cell-input { width: 100%; outline: none; padding: 4px; border-bottom: 1px solid transparent; background: transparent; }
        .cell-input:focus { border-bottom-color: #6366f1; background: white; }
        .disabled-input { background-color: #f8fafc !important; cursor: not-allowed !important; color: #94a3b8 !important; pointer-events: none; }
        .modified-highlight { background-color: #fff1f2 !important; border: 2px solid #f43f5e !important; }
        .gl-disabled { position: relative; }
        .gl-disabled::after {
            content: ''; position: absolute; inset: 0; background-color: rgba(248, 249, 250, 0.82);
            cursor: not-allowed; z-index: 10; border-radius: 8px;
        }
        .gl-disabled label { color: #94a3b8 !important; }
        .gl-disabled input, .gl-disabled select, .gl-disabled button { background-color: #f8f9fa !important; color: #adb5bd !important; }
        .biz-gl-locked { background-color: #eff6ff !important; color: #1d4ed8 !important; cursor: not-allowed !important; pointer-events: none; font-weight: 600; }
        .biz-gl-locked-btn { background-color: #dbeafe !important; color: #93c5fd !important; cursor: not-allowed !important; pointer-events: none; }
        .fuzzy-match { background-color: #fffbeb !important; border-color: #fbbf24 !important; box-shadow: 0 0 0 1px #fcd34d; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-[1600px] mx-auto bg-white shadow-2xl rounded-2xl overflow-hidden border">
        <div class="px-6 py-3 border-b bg-slate-50 flex items-center gap-4">
            <div class="flex items-center gap-2 w-full">
                <span class="bg-amber-100 text-amber-700 px-3 py-1 rounded-md text-xs font-bold whitespace-nowrap"><i class="fa-solid fa-lightbulb"></i> 상황별 예제</span>
                <select id="example-select" class="border p-1.5 rounded text-xs w-40" onchange="onExampleChange()">
                    <option value="">예제를 선택하세요</option>
                    {% for key, val in examples.items() %}
                    <option value="{{ key }}">{{ val.label }}</option>
                    {% endfor %}
                </select>
                <span id="example-display" class="text-sm text-slate-800 font-bold flex-1 ml-2 border-l border-slate-300 pl-3 truncate"></span>
            </div>
        </div>

        <div class="p-6 border-b bg-white">
            <div class="flex gap-4">
                <textarea id="ai-input" class="flex-1 border p-4 rounded-xl text-sm h-28 focus:ring-2 focus:ring-indigo-500" placeholder="거래 내용을 입력하세요..."></textarea>
                <div class="flex flex-col gap-2 w-56">
                    <div class="flex gap-2">
                        <button id="btn-ai-parse" onclick="onAiParse()" class="flex-1 bg-indigo-600 text-white p-3 rounded-lg font-bold hover:bg-indigo-700 transition-all text-sm cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed">
                            <i class="fa-solid fa-wand-magic-sparkles mr-1"></i> <span id="ai-text">AI 분개</span>
                        </button>
                        <button onclick="onCancel()" class="bg-white border border-slate-200 text-slate-600 px-4 rounded-lg font-bold hover:bg-slate-50 text-sm cursor-pointer">취소</button>
                    </div>
                    <button onclick="onPostJournal()" class="bg-slate-800 text-white p-4 rounded-lg font-bold hover:bg-slate-900 shadow-lg active:scale-95 transition-all cursor-pointer"><i class="fa-solid fa-save mr-1"></i> 전표 생성 (Posting)</button>
                </div>
            </div>
        </div>

        <div class="p-6 border-b bg-white">
            <h3 class="font-bold text-indigo-800 text-sm mb-4 border-l-4 border-indigo-600 pl-2">전표 헤더 (Header Info)</h3>
            <div class="grid grid-cols-5 gap-6 text-[11px]">
                <div class="col-span-2" id="bizpt-group">
                    <label class="font-bold text-slate-500 mb-1 block">거래처코드 / 명</label>
                    <div class="flex border rounded-lg overflow-hidden" id="bizpt-container">
                        <input type="text" id="h-bizptcd" class="w-1/3 p-2 font-mono bg-slate-50" readonly>
                        <button onclick="openSearch('bizpt')" class="px-3 border-x bg-slate-50 hover:bg-slate-200 cursor-pointer"><i class="fa-solid fa-magnifying-glass"></i></button>
                        <input type="text" id="h-bizname" class="w-2/3 p-2 outline-none bg-slate-50" readonly placeholder="필수 검색">
                    </div>
                </div>
                <div>
                    <label class="font-bold text-slate-500 mb-1 block">전표유형 / 전기일자</label>
                    <div class="flex gap-1">
                        <select id="h-doctyp" class="w-1/3 border p-2 rounded-lg cursor-pointer" onchange="onDoctypChange()"><option value="CI">CI(매출)</option><option value="SI">SI(매입)</option><option value="GL">GL(일반)</option></select>
                        <input type="date" id="h-pstdate" class="w-2/3 border p-2 rounded-lg cursor-pointer" onchange="syncDates()">
                    </div>
                </div>
                <div>
                    <label class="font-bold text-slate-500 mb-1 block">통화 / 환율</label>
                    <div class="flex border rounded-lg overflow-hidden">
                        <input type="text" id="h-currency" value="KRW" class="w-1/3 p-2 text-center border-r font-bold">
                        <input type="number" id="h-exrate" value="1" class="w-2/3 p-2 text-right" onchange="calculateAll()">
                    </div>
                    <input type="hidden" id="h-local-currency" value="KRW">
                </div>
                <div>
                    <label class="font-bold text-slate-500 mb-1 block">분개수정 (사유)</label>
                    <select id="h-modify" class="w-full border p-2 rounded-lg cursor-pointer"><option value="">선택하세요</option><option value="POLICY">내부 규정</option><option value="ETC">기타</option></select>
                </div>
                <div id="taxinfo-group">
                    <label class="font-bold text-slate-500 mb-1 block">세금코드</label>
                    <div class="flex border rounded-lg overflow-hidden" id="taxinfo-container">
                        <input type="text" id="h-taxinfo" class="w-full p-2" readonly placeholder="필수 검색">
                        <button onclick="openSearch('taxkey')" class="px-3 border-l bg-slate-50 hover:bg-slate-200 cursor-pointer"><i class="fa-solid fa-magnifying-glass"></i></button>
                    </div>
                </div>
                <div id="taxdate-group"><label class="font-bold text-slate-500 mb-1 block">(세금)계산서 발행일</label><input type="date" id="h-taxdate" class="w-full border p-2 rounded-lg cursor-pointer"></div>
                <div><label class="font-bold text-slate-500 mb-1 block">멀티키(Mulky)</label><select id="h-mulky" class="w-full border p-2 rounded-lg bg-orange-50 text-orange-700 cursor-pointer"><option value=" "> </option><option value="A">A(선수/선급)</option></select></div>
                <div>
                    <label class="font-bold text-slate-500 mb-1 block">손익부서</label>
                    <div class="flex border rounded-lg overflow-hidden" id="pctr-container">
                        <input type="text" id="h-pctrcd" class="w-1/3 p-2 font-mono bg-slate-50" readonly>
                        <button onclick="openSearch('pctr')" class="px-3 border-x bg-slate-50 hover:bg-slate-200 cursor-pointer"><i class="fa-solid fa-magnifying-glass"></i></button>
                        <input type="text" id="h-pctrnm" class="w-2/3 p-2 outline-none bg-slate-50" readonly placeholder="필수 검색">
                    </div>
                </div>
                <div>
                    <label class="font-bold text-slate-500 mb-1 block">관리항목(manaky)</label>
                    <div class="flex border rounded-lg overflow-hidden" id="anakey-container">
                        <input type="text" id="h-anakey" class="w-1/3 p-2 font-mono bg-slate-50" readonly>
                        <button onclick="openSearch('anakey')" class="px-3 border-x bg-slate-50 hover:bg-slate-200 cursor-pointer"><i class="fa-solid fa-magnifying-glass"></i></button>
                        <input type="text" id="h-ananm" class="w-2/3 p-2 outline-none bg-slate-50" readonly placeholder="필수 검색">
                    </div>
                </div>
                <div class="col-span-2 flex gap-4">
                    <div class="w-1/2"><label class="font-bold text-slate-500 mb-1 block">증빙일자</label><input type="date" id="h-docdate" class="w-full border p-2 rounded-lg"></div>
                    <div class="w-1/2"><label class="font-bold text-slate-500 mb-1 block">환산일자</label><input type="date" id="h-transdt" class="w-full border p-2 rounded-lg text-indigo-700 bg-indigo-50" onchange="onTransDtChange()"></div>
                </div>
                <div class="col-span-3"><label class="font-bold text-slate-500 mb-1 block">적요</label><input type="text" id="h-text" class="w-full border p-2 rounded-lg" placeholder="전표 전체 적요를 입력하세요."></div>
            </div>
        </div>

        <div class="p-6 bg-slate-50/50">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-indigo-800 text-sm border-l-4 border-indigo-600 pl-2">분개 상세 내역 (Line Items)</h3>
                <div class="flex gap-2">
                    <button onclick="addNewLine()" class="bg-indigo-50 text-indigo-600 px-4 py-1 rounded-full border border-indigo-200 text-[11px] font-bold hover:bg-indigo-100">+ 라인추가</button>
                    <button onclick="deleteSelected()" class="bg-rose-50 text-rose-600 px-4 py-1 rounded-full border border-rose-200 text-[11px] font-bold hover:bg-rose-100">- 라인삭제</button>
                </div>
            </div>
            <div class="overflow-x-auto border border-slate-200 rounded-xl shadow-sm bg-white max-h-[400px]">
                <table class="w-full text-[11px] text-left whitespace-nowrap">
                    <thead class="bg-slate-100 sticky top-0 font-bold border-b text-slate-600">
                        <tr><th class="p-3 w-12 text-center">No</th><th class="p-3 w-20">구분</th><th class="p-3 w-40">계정코드</th><th class="p-3 w-40">계정명</th><th class="p-3 text-right w-36">거래통화금액</th><th class="p-3 text-right w-36">로컬금액(KRW)</th><th class="p-3 w-28">부서</th><th class="p-3 w-28">관리항목</th><th class="p-3 w-28">만기일</th><th class="p-3">적요</th><th class="p-3 w-24 text-center">출처</th></tr>
                    </thead>
                    <tbody id="journal-tbody" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
            <div class="mt-4 p-4 bg-slate-900 text-white rounded-xl flex justify-end gap-12 font-bold text-xs" id="sum-area">
                <div id="sum-debit">차변합: <span class="text-blue-400 ml-1">0</span></div>
                <div id="sum-credit">대변합: <span class="text-rose-400 ml-1">0</span></div>
                <div id="sum-diff">차이: 0</div>
            </div>
        </div>
    </div>

    <div id="search-modal" class="fixed inset-0 bg-slate-900/60 hidden z-50 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white w-[500px] rounded-2xl shadow-2xl overflow-hidden">
            <div class="p-4 bg-slate-100 border-b flex justify-between items-center font-bold">
                <span>마스터 데이터 검색</span>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-800 text-lg">✕</button>
            </div>
            <div class="p-4 flex gap-2 bg-white">
                <input type="text" id="modal-query" class="flex-1 border p-3 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500" placeholder="검색어 입력..." onkeydown="if(event.key==='Enter') executeSearch()">
                <button onclick="executeSearch()" class="bg-indigo-600 text-white px-5 rounded-lg text-sm font-bold hover:bg-indigo-700">검색</button>
            </div>
            <div id="modal-results" class="max-h-[520px] overflow-y-auto p-2 bg-slate-50"></div>
        </div>
    </div>

    <script type="application/json" id="examples-data">{{ examples | tojson | safe }}</script>

    <script>
        const API_BASE = "/api";
        const examples = JSON.parse(document.getElementById('examples-data').textContent);
        let isManualEdit = false, selectedRow = null, currentSearchType = "", activeLineBtn = null, currentPatternId = null, currentMatchScore = null;
        let aiSnapshot = [];

        function resetModifyField() { const el = document.getElementById('h-modify'); if (!el) return; el.value = ''; el.classList.remove('modified-highlight'); el.removeAttribute('required'); }
        function onExampleChange() { const val = document.getElementById('example-select').value; const d = document.getElementById('example-display'); if (val && examples[val]) { d.textContent = examples[val].text; d.title = examples[val].text; } else { d.textContent = ""; d.title = ""; } }
        async function loadDbPatterns() { try { const res = await fetch(`${API_BASE}/patterns`); if (!res.ok) return; const patterns = await res.json(); const sel = document.getElementById('example-select'); if (patterns.length > 0) { const sep = document.createElement('option'); sep.disabled = true; sep.textContent = '─── 학습된 DB 패턴 ───'; sel.appendChild(sep); patterns.forEach(p => { const key = `db_${p.id}`; examples[key] = { label: p.pattern_nm, text: p.example_tx || '' }; const opt = document.createElement('option'); opt.value = key; opt.textContent = `${p.pattern_nm}${p.docty ? ' (' + p.docty + ')' : ''}`; sel.appendChild(opt); }); } } catch (e) { console.warn('DB 패턴 로드 실패:', e); } }
        function setBtnState(state) { const btn = document.getElementById('btn-ai-parse'); const txt = document.getElementById('ai-text'); if (state === 'loading') { btn.disabled = true; txt.innerText = '분석 중...'; } else if (state === 'done') { btn.disabled = false; txt.innerHTML = '<i class="fa-solid fa-rotate-right mr-1"></i>재분석'; } else { btn.disabled = false; txt.innerHTML = 'AI 분개'; } }
        function resetHeaderHighlights() { ['bizpt-container', 'pctr-container', 'anakey-container', 'taxinfo-container'].forEach(id => { document.getElementById(id)?.classList.remove('border-red-500', 'ring-1', 'ring-red-500', 'bg-red-50', 'fuzzy-match'); }); }

        async function onAiParse() {
            const text = document.getElementById('ai-input').value; if(!text) return alert("내용을 입력하세요.");
            document.getElementById('journal-tbody').innerHTML = ''; resetHeaderHighlights();
            ['h-bizptcd','h-bizname','h-taxinfo','h-taxdate','h-pctrcd','h-pctrnm','h-anakey','h-ananm'].forEach(id => { const el = document.getElementById(id); if (el) { el.value = ''; if(el.dataset) { el.dataset.supplyBase = '0'; el.dataset.supplyVat = '0'; el.dataset.taxrate = ''; el.dataset.txgubun = ''; } } });
            // 멀티키(h-mulky) 초기화 및 이전 전표에서 걸린 disabled 해제
            const _mulkyEl = document.getElementById('h-mulky'); if (_mulkyEl) { _mulkyEl.value = ' '; _mulkyEl.disabled = false; _mulkyEl.classList.remove('opacity-50','cursor-not-allowed','bg-slate-100'); }
            aiSnapshot = []; isManualEdit = false; resetModifyField(); setBtnState('loading');
            try {
                let res = await fetch(`${API_BASE}/ai-parse`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ user_id: "USER01", natural_text: text }) });
                if(res.status === 401) { window.top.location.href = '/login'; return; }
                const data = await res.json();
                if(res.ok && data.status === 'success') {
                    currentPatternId = data.pattern_id || null; currentMatchScore = data.parsed_entities.match_score ?? null;
                    fillHeader(data.parsed_entities); renderLines(data.recommended_pattern, data.parsed_entities.total_amount, data.parsed_entities.due_date, data.parsed_entities.source);
                    setBtnState('done'); if (data.parsed_entities.balance_warning) setTimeout(() => alert('⚠️ ' + data.parsed_entities.balance_warning), 200);
                } else { alert("분석 실패: " + (data.message || "서버 오류")); setBtnState('idle'); }
            } catch (err) { alert("서버 연결 실패."); setBtnState('idle'); }
        }

        function onCancel() {
            document.getElementById('ai-input').value = ''; document.getElementById('journal-tbody').innerHTML = ''; resetHeaderHighlights();
            ['h-pstdate','h-docdate','h-transdt','h-text','h-bizptcd','h-bizname','h-taxinfo','h-taxdate','h-pctrcd','h-pctrnm','h-anakey','h-ananm'].forEach(id => { const el = document.getElementById(id); if (el) { el.value = ''; if(el.dataset) { el.dataset.supplyBase = '0'; el.dataset.supplyVat = '0'; el.dataset.taxrate = ''; el.dataset.txgubun = ''; } } });
            // 멀티키 초기화 + 잠금 해제
            const _cm = document.getElementById('h-mulky'); if (_cm) { _cm.value = ' '; _cm.disabled = false; _cm.classList.remove('opacity-50','cursor-not-allowed','bg-slate-100'); _cm.title = ''; }
            document.getElementById('h-doctyp').value = 'CI'; onDoctypChange(); calculateAll(); resetModifyField(); aiSnapshot = []; isManualEdit = false; currentPatternId = null; currentMatchScore = null; setBtnState('idle');
        }

        function syncDates() { const pst = document.getElementById('h-pstdate').value; if(pst) document.getElementById('h-transdt').value = pst; }
        function syncPctrToLines() { const val = document.getElementById('h-pctrcd').value; document.querySelectorAll('.line-pctr').forEach(input => { if (input.dataset.isManual !== 'true') input.value = val; }); markEdit(); }
        function syncAnaToLines() { const val = document.getElementById('h-anakey').value; document.querySelectorAll('.line-anakey').forEach(input => { if (input.dataset.isManual !== 'true') input.value = val; }); markEdit(); }

        function setManualLock(input) {
            input.dataset.isManual = 'true';
            input.classList.add('bg-yellow-50');
        }
        function clearManualLock(input, headerVal) {
            input.dataset.isManual = 'false';
            input.classList.remove('bg-yellow-50');
            input.value = headerVal;
            markEdit();
        }

        function onDoctypChange() {
            const doctyp = document.getElementById('h-doctyp').value;
            const isGL   = doctyp === 'GL';
            const isSI   = doctyp === 'SI';

            ['bizpt-group', 'taxinfo-group', 'taxdate-group'].forEach(id => {
                document.getElementById(id).classList.toggle('gl-disabled', isGL);
            });

            if (isGL) {
                // GL: 거래처·세금코드·발행일 전체 초기화 및 비활성
                document.getElementById('bizpt-container').classList.remove('border-red-500', 'ring-1', 'ring-red-500', 'bg-red-50');
                document.getElementById('taxinfo-container').classList.remove('border-red-500', 'ring-1', 'ring-red-500', 'bg-red-50');
                document.getElementById('h-bizptcd').value = '';
                document.getElementById('h-bizname').value = '';
                document.getElementById('h-taxinfo').value = '';
                document.getElementById('h-taxdate').value = '';
            } else {
                // CI / SI 공통: 그룹 전체 활성화 후 유형별 추가 제어
                ['bizpt-group', 'taxinfo-group', 'taxdate-group'].forEach(id => {
                    const el = document.getElementById(id);
                    el.classList.remove('gl-disabled');
                    el.querySelectorAll('input, select, button').forEach(inp => {
                        inp.disabled = false;
                        inp.classList.remove('disabled-input');
                    });
                });

                // SI(매입): 세금계산서 발행일은 입력 대상이 아님 → 초기화 및 비활성
                if (isSI) {
                    const taxDateEl = document.getElementById('h-taxdate');
                    taxDateEl.value = '';
                    taxDateEl.classList.add('disabled-input');
                    taxDateEl.disabled = true;
                }
            }
        }

        function renderLines(p, t, dueDate, source = "") {
            const b = document.getElementById('journal-tbody'); b.innerHTML = ''; const lines = p || []; const total = parseFloat(t) || 0; const doctyp = document.getElementById('h-doctyp').value;
            const hasTaxLine = lines.some(l => l.type === 'TAX'); let s = total, v = 0; if (hasTaxLine) { s = Math.round(total / 1.1); v = total - s; }
            const currentPctr = document.getElementById('h-pctrcd').value; const currentAna = document.getElementById('h-anakey').value;
            lines.forEach((l) => { const serverAmt = parseFloat(l.bizamt) || 0; let amt; if (serverAmt > 0) amt = serverAmt; else { amt = total; if (l.type === 'TAX') amt = v; else if (l.type === 'REV' || (doctyp === 'SI' && (l.type === 'EXP' || l.type === 'COG'))) amt = s; else if (l.type === 'EXP' || l.type === 'COG') amt = (hasTaxLine ? s : total); } l._calcAmt = amt; l.pctrcd = currentPctr || l.pctrcd || ''; l.anakey = currentAna || l.anakey || ''; });
            lines.sort((a, b) => { if (b._calcAmt !== a._calcAmt) return b._calcAmt - a._calcAmt; return (a.glmaster || "999999").localeCompare(b.glmaster || "999999"); });
            lines.forEach((l, i) => { b.appendChild(createRow(i+1, l, l._calcAmt, dueDate, source)); });
            calculateAll(); aiSnapshot = lines.map(l => ({ debcre: l.debcre || 'D', glmaster: l.glmaster || '', amt: l._calcAmt || 0 })); isManualEdit = false; resetModifyField();
        }

        function createRow(no, line={}, amt=0, dueDate='', source='') {
            const tr = document.createElement('tr'); if (line.type) tr.dataset.aiType = line.type; if (line.type === 'TAX') tr.dataset.isTax = "Y"; if (line.gltype) tr.dataset.gltype = line.gltype;
            const _dueLfc = (line.line_field_control || {}).due_date;
            let isDue = _dueLfc
                ? (_dueLfc.status === 'REQUIRED_RED' || _dueLfc.status === 'EDITABLE' || _dueLfc.status === 'WARNING_YELLOW')
                : (line.due_date_enabled === true || line.gltype === 'C' || line.gltype === 'S');
            const dueClass    = isDue ? '' : 'disabled-input';
            const dueDisabled = isDue ? '' : 'disabled';
            const finalDueDate = isDue ? (line.duedt || dueDate || '') : '';
            // WARNING_YELLOW: 자동 입력 상태 → fuzzy-match 클래스로 노란 테두리, title로 안내
            const dueWarnClass = (_dueLfc && _dueLfc.status === 'WARNING_YELLOW') ? ' fuzzy-match' : '';
            const dueTitle     = (_dueLfc && _dueLfc.msg) ? _dueLfc.msg : '';
            if (line.intent_override) { tr.classList.add('bg-amber-50'); tr.style.borderLeft = '3px solid #fbbf24'; }

        /**
         * 환산일자(#h-transdt) 변경 시 t_nexrate에서 환율을 실시간 재조회.
         * - 동일 통화(srccur === tarcur)면 환율을 1로 고정하고 종료.
         * - 외화 거래라면 API를 호출해 h-exrate를 업데이트하고 calculateAll() 실행.
         */
        async function onTransDtChange() {
            const localCur = (document.getElementById('h-local-currency').value || 'KRW').toUpperCase().trim();
            const txCur    = (document.getElementById('h-currency').value     || localCur).toUpperCase().trim();
            const txDate   = document.getElementById('h-transdt').value;

            if (txCur === localCur) {
                document.getElementById('h-exrate').value = 1;
                calculateAll();
                return;
            }

            if (!txDate) return;

            try {
                const res  = await fetch(
                    `${API_BASE}/exrate?srccur=${encodeURIComponent(txCur)}&tarcur=${encodeURIComponent(localCur)}&target_date=${encodeURIComponent(txDate)}`
                );
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                document.getElementById('h-exrate').value = data.exrate ?? 1;
                if (!data.found) console.warn(`[환율조회] 데이터 없음: ${txCur}/${localCur} as-of ${txDate}`);
            } catch (e) {
                console.warn('[환율조회 실패]', e);
            }
            calculateAll();
        }

        function calculateAll() {
            let dSum=0, cSum=0; const ex = parseFloat(document.getElementById('h-exrate').value) || 1;
            document.querySelectorAll('#journal-tbody tr').forEach(tr => {

                tr.querySelector('.loc-amt-display').textContent = Math.round(bAmt * ex).toLocaleString();
                if(tr.querySelector('.side-select').value === 'D') dSum += bAmt; else cSum += bAmt;
            });
            document.getElementById('sum-debit').innerHTML = `차변합: <span class="text-blue-400 ml-1">${dSum.toLocaleString()}</span>`;
            document.getElementById('sum-credit').innerHTML = `대변합: <span class="text-rose-400 ml-1">${cSum.toLocaleString()}</span>`;
            const diff = dSum - cSum; const d = document.getElementById('sum-diff'); d.textContent = `차이: ${diff.toLocaleString()}`; d.className = diff === 0 ? "text-green-400" : "text-yellow-400";
            return diff === 0;
        }

        /**
         * 세금코드 선택 시 분개 라인 금액 재계산
         * @param {string} taxcd    - 세금코드
         * @param {string} taxnm    - 세금코드명
         * @param {string} txgubun  - 세금구분 ('1'=일반, 'D'=불공제, '2'/'3'=영세/면세)
         * @param {number} taxrate  - 실제 세율 숫자 (0, 10 등). DB t_ctxkey.taxrate 값.
         *
         * ─ 계산 원칙 ─
         * taxrate > 0 && txgubun === '1' → 1/(1+taxrate%) 안분, TAX 라인 생성/유지
         * taxrate > 0 && txgubun === 'D' → 불공제: 전액 비용, TAX 라인 제거
         * taxrate === 0                  → 부가세 없음: 전액 비용, TAX 라인 삭제
         */
        function onTaxCodeSelected(taxcd, taxnm, txgubun, taxrate) {
            taxrate = parseFloat(taxrate) || 0;

            const rows = Array.from(document.querySelectorAll('#journal-tbody tr'));
            if (rows.length === 0) return;

            // 기준 합계 금액 산출 (AR/AP 라인 우선, 없으면 해당 차대변 합)
            let total = 0;
            for (const tr of rows) {
                const aiType = (tr.dataset.aiType || '').toUpperCase();
                if (aiType === 'AR' || aiType === 'AP') {
                    total = parseFloat(tr.querySelector('.amt-input')?.value?.replace(/,/g, '') || '0') || 0;
                    break;
                }
            }
            if (total <= 0) {
                const side = document.getElementById('h-doctyp').value === 'CI' ? 'D' : 'C';
                rows.forEach(tr => {
                    if ((tr.querySelector('.side-select')?.value || '') === side)
                        total += parseFloat(tr.querySelector('.amt-input')?.value?.replace(/,/g, '') || '0') || 0;
                });
            }
            if (total <= 0) return;

            // ── 공급가 / 부가세 계산 ─────────────────────────────────────────
            // taxrate > 0 && 일반과세(1): AI/백엔드 AMOUNT_EXTRACTION_RULES와 동기화
            //   공급가 = Math.round(총액 / (1 + taxrate/100))
            // 그 외(불공제·면세·taxrate=0): 총액 = 공급가, 부가세 = 0
            const isNormalVat = (txgubun === '1' && taxrate > 0);
            const base = isNormalVat ? Math.round(total / (1 + taxrate / 100)) : total;
            const vat  = isNormalVat ? (total - base) : 0;

            const hTax = document.getElementById('h-taxinfo');
            hTax.dataset.supplyBase = base;
            hTax.dataset.supplyVat  = vat;

            // ── 기존 라인 업데이트 ────────────────────────────────────────────
            // 부가세 라인 판별 기준:
            //   ① tr.dataset.isTax === 'Y'  (렌더링 시 세팅된 플래그)
            //   ② 계정코드가 '213000'(매입부가세) 또는 '214000'(매출부가세)
            // 중복 방지: 첫 번째 부가세 라인만 금액 갱신, 나머지는 tr.remove()로 제거
            let hasTaxLine = false;
            rows.forEach(tr => {
                const aiType   = (tr.dataset.aiType || '').toUpperCase();
                const amtInput = tr.querySelector('.amt-input');
                const glCode   = (tr.querySelector('.line-gl')?.value || '').trim();
                const isTaxRow = tr.dataset.isTax === 'Y'
                              || glCode === '213000'
                              || glCode === '214000';

                if (isTaxRow) {
                    if (!isNormalVat || vat === 0) {
                        tr.remove();   // taxrate=0·불공제 → TAX 라인 전체 삭제
                    } else if (!hasTaxLine) {
                        // 첫 번째 부가세 라인만 금액 갱신
                        amtInput.value = vat.toLocaleString();
                        hasTaxLine = true;
                    } else {
                        // 두 번째 이상 중복 부가세 라인 → 제거(차대 합계 어긋남 방지)
                        tr.remove();
                    }
                } else if (aiType === 'EXP' || aiType === 'REV' || aiType === 'COG') {
                    // 불공제(D)이면서 세율 있음 → 전액 비용; 그 외 → 공급가
                    amtInput.value = (txgubun === 'D' && taxrate > 0 ? total : base).toLocaleString();
                }
            });

            // ── 부가세 라인 신규 생성 (일반과세 & 세액 > 0 & 라인 없을 때만) ──
            if (isNormalVat && vat > 0 && !hasTaxLine) {
                const b     = document.getElementById('journal-tbody');
                const isCI  = document.getElementById('h-doctyp').value === 'CI';
                const taxLine = {
                    debcre: isCI ? 'C' : 'D',
                    glmaster: isCI ? '214000' : '213000',
                    glname:   isCI ? '매출부가세' : '매입부가세',
                    gltype: 'X', type: 'TAX', source: '규칙 반영'
                };
                b.appendChild(createRow(b.children.length + 1, taxLine, vat));
            }

            calculateAll(); markEdit();
        }

        /**
         * 마스터 테이블 실시간 존재 여부 검증
         * comcd는 서버에서 JWT 세션으로 자동 확인 — 프론트에서 전달 불필요
         * @param {string} type  - "glmaster" | "pctr" | "anakey"
         * @param {string} value - 검증할 코드 값
         * @param {HTMLElement} element - 오류 표시를 붙일 input 요소

         */
        async function checkMasterExistence(type, value, element) {
            if (!value) return true;
            try {
                const res = await fetch(`${API_BASE}/validate-master`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type, value })
                });
                if (!res.ok) return true; // 서버 오류 시 통과 (저장 시 이중 검증으로 차단)
                const data = await res.json();
                if (!data.exists) {
                    const MSG = {
                        glmaster: `계정코드 '${value}'는 마스터에 존재하지 않습니다.`,
                        pctr:     `손익부서 코드 '${value}'는 마스터에 존재하지 않습니다.`,
                        anakey:   `관리항목 코드 '${value}'는 마스터에 존재하지 않습니다.`,
                    };
                    alert(MSG[type] || "존재하지 않는 코드입니다.");
                    element.classList.add('border-red-500', 'bg-red-50');
                    element.value = "";
                    return false;
                }
                element.classList.remove('border-red-500', 'bg-red-50');
                return true;
            } catch {
                return true; // 네트워크 오류 시 통과
            }
        }

                setTimeout(() => badge.remove(), 8000);
            }
            // ── 세금계산서 발행일: 'GL'이 아닌 경우에만 세팅 (조건문 버그 수정) ─
            if (document.getElementById('h-doctyp').value !== 'GL') { 
                document.getElementById('h-taxdate').value = e.tax_invoice_date || ''; 
                if (hfc.tax_invoice_date) applyFieldControl('h-taxdate', 'taxdate-group', hfc.tax_invoice_date); 
            } 
            
            document.getElementById('h-bizptcd').value = e.bizptcd || ''; 
            document.getElementById('h-bizname').value = e.bizname || ''; 
            if (e.bizptcd) {
                document.getElementById('h-bizptcd').dispatchEvent(new Event('input'));
                applyBizptGl(e.bizptcd);
            }

            // GL 전표는 거래처 입력 자체가 없으므로 REQUIRED_RED/USER_SELECT_REQUIRED 상태를 무시
            if (hfc.bizptcd) {
                const _isGL = document.getElementById('h-doctyp').value === 'GL';
                const _bfc  = (_isGL && ['REQUIRED_RED','USER_SELECT_REQUIRED'].includes(hfc.bizptcd.status))
                    ? { status: 'EDITABLE', msg: '' }
                    : hfc.bizptcd;
                applyFieldControl('h-bizptcd', 'bizpt-container', _bfc);
            } else if (!e.bizptcd && document.getElementById('h-doctyp').value !== 'GL') {
                document.getElementById('bizpt-container').classList.add('border-red-500','ring-1','ring-red-500','bg-red-50');
            }
            
            // 멀티키(mulky): AI 판단 결과 바인딩 후 field_control 신호로 잠금 여부 결정
            const mulkyEl = document.getElementById('h-mulky');
            if (mulkyEl) {
                mulkyEl.value = e.mulky || ' ';
                // DISABLED 신호: 선수금('A') 전표 → 셀렉트 비활성화 + 시각적 잠금 스타일
                if (hfc.mulky && hfc.mulky.status === 'DISABLED') {
                    mulkyEl.disabled = true;
                    mulkyEl.classList.add('opacity-50', 'cursor-not-allowed', 'bg-slate-100');
                    mulkyEl.title = hfc.mulky.msg || '';
                } else {
                    mulkyEl.disabled = false;
                    mulkyEl.classList.remove('opacity-50', 'cursor-not-allowed', 'bg-slate-100');
                    mulkyEl.title = '';
                }
            }

            document.getElementById('h-pctrcd').value = e.pctrcd || '';
            document.getElementById('h-pctrnm').value = e.pctrnm || '';
            if (e.pctrcd) syncPctrToLines();
            const _pctrSt = { 'EXACT': 'EDITABLE', 'FUZZY': 'WARNING_YELLOW', 'NONE': 'REQUIRED_RED' }[e.pctr_match_status] || 'REQUIRED_RED';
            applyFieldControl('h-pctrcd', 'pctr-container', { status: _pctrSt });

            document.getElementById('h-anakey').value = e.manaky || '';
            document.getElementById('h-ananm').value = e.mananm || '';
            if (e.manaky) syncAnaToLines();
            const _anaSt = { 'EXACT': 'EDITABLE', 'FUZZY': 'WARNING_YELLOW', 'NONE': 'REQUIRED_RED' }[e.ana_match_status] || 'REQUIRED_RED';
            applyFieldControl('h-anakey', 'anakey-container', { status: _anaSt });
            
            const hTax = document.getElementById('h-taxinfo');
            if (e.taxcd) {
                hTax.value = e.taxcd + ' : ' + e.taxnm; 
                hTax.dataset.txgubun = e.txgubun || ''; 
                hTax.dataset.supplyBase = e.supply_base || '0';
                hTax.dataset.supplyVat = e.supply_vat || '0';
            } else {
                hTax.value = '';
            }

            if (hfc.taxcode) applyFieldControl('h-taxinfo', 'taxinfo-container', hfc.taxcode); 
            else if (!e.taxcd) document.getElementById('taxinfo-container').classList.add('border-red-500','ring-1','ring-red-500','bg-red-50');

            // ── 통화·환율: AI 응답 반영 ─────────────────────────────────────
            // e.local_currency: t_company 조회 회사 기준 통화 (없으면 'KRW' 폴백)
            // e.currency      : AI/Python이 감지한 거래 통화코드
            // e.exrate        : t_exrate에서 조회한 환율 (로컬통화=1, 외화=실조회값)
            // h-exrate 변경 시 onchange="calculateAll()"이 이미 연결되어 있으므로
            // 여기서는 값만 세팅하고 calculateAll()을 명시적으로 호출해 로컬 금액 즉시 갱신.
            const _localCur = (e.local_currency || 'KRW').toUpperCase().trim();
            const _aiCur    = (e.currency || _localCur).toUpperCase().trim();
            document.getElementById('h-currency').value       = _aiCur;
            document.getElementById('h-local-currency').value = _localCur;
            document.getElementById('h-exrate').value   = (_aiCur !== _localCur && e.exrate && e.exrate !== 1)
                ? e.exrate : 1;
            calculateAll();
        }

        function openSearch(t, btn=null) { currentSearchType = t; activeLineBtn = btn; const modal = document.getElementById('search-modal'); modal.classList.remove('hidden'); document.getElementById('modal-results').innerHTML = ''; document.getElementById('modal-query').value = ''; document.getElementById('modal-query').focus(); if (t === 'glmaster') executeSearch(); }
        function closeModal() { document.getElementById('search-modal').classList.add('hidden'); }
        async function executeSearch() { const q = document.getElementById('modal-query').value; try { let res = await fetch(`${API_BASE}/search/${currentSearchType}?q=${encodeURIComponent(q)}`); const data = await res.json(); if (data.length === 0) { document.getElementById('modal-results').innerHTML = '<div class="p-4 text-center text-slate-500">결과가 없습니다.</div>'; return; } document.getElementById('modal-results').innerHTML = data.map(i => `<div onclick="selectItem('${i.code}','${i.name}', '${i.type||''}')" class="p-4 bg-white hover:bg-indigo-50 cursor-pointer border-b text-sm font-bold"><b>${i.code}</b> | <span>${i.name}</span></div>`).join(''); } catch(err) { alert(`검색 오류: ${err.message}`); } }
        function selectItem(c, n, t) {
            if(currentSearchType === 'bizpt') {
                document.getElementById('h-bizptcd').value = c;
                document.getElementById('h-bizname').value = n;
                document.getElementById('bizpt-container').classList.remove('border-red-500','ring-1','ring-red-500','bg-red-50','fuzzy-match');
                applyBizptGl(c);
            } else if(currentSearchType === 'pctr') {
                if (activeLineBtn) {
                    // 라인 개별 검색: 버튼과 같은 flex div 안의 line-pctr에만 적용 + 잠금
                    const inp = activeLineBtn.closest('div').querySelector('.line-pctr');
                    if (inp) { inp.value = c; setManualLock(inp); markEdit(); }
                } else {
                    // 헤더 검색: 전체 미잠금 라인에 동기화
                    document.getElementById('h-pctrcd').value = c;
                    document.getElementById('h-pctrnm').value = n;
                    document.getElementById('pctr-container').classList.remove('border-red-500','ring-1','ring-red-500','bg-red-50','fuzzy-match');
                    syncPctrToLines();
                }
            } else if(currentSearchType === 'anakey') {
                if (activeLineBtn) {
                    // 라인 개별 검색: 버튼과 같은 flex div 안의 line-anakey에만 적용 + 잠금
                    const inp = activeLineBtn.closest('div').querySelector('.line-anakey');
                    if (inp) { inp.value = c; setManualLock(inp); markEdit(); }
                } else {
                    // 헤더 검색: 전체 미잠금 라인에 동기화
                    document.getElementById('h-anakey').value = c;
                    document.getElementById('h-ananm').value = n;
                    document.getElementById('anakey-container').classList.remove('border-red-500','ring-1','ring-red-500','bg-red-50','fuzzy-match');
                    syncAnaToLines();
                }
            } else if(currentSearchType === 'taxkey') {
                // ── taxtyp vs doctyp 방향 검증 ────────────────────────────────
                // t 형식: 'txgubun|taxtyp|taxrate'  (mainai.py SQL에서 || 연결로 전달)
                // · txgubun : 세금구분 ('1'=일반, 'D'=불공제, '2'/'3'=영세/면세)
                // · taxtyp  : 방향구분 ('S'=매출, 'P'=매입, 'D'=불공제매입)
                // · taxrate : 실제 세율 숫자 (0, 10 등)
                const _parts  = (t || '').split('|');
                const txgubun = _parts[0] || '';
                const taxtyp  = _parts[1] || '';
                const taxrate = parseFloat(_parts[2]) || 0;
                const doctyp  = document.getElementById('h-doctyp').value;
                // taxtyp 값이 있을 때만 검증 (값 없으면 마스터 미설정으로 Skip)
                // DB(t_ctxkey) 실제 값: 'S'=매출(Output), 'P'=매입(Input), 'D'=불공제매입
                if (taxtyp) {
                    if (doctyp === 'CI' && taxtyp !== 'S') {
                        alert("선택하신 tax code가 매입 또는 매출 관련 여부인지 확인하세요.\n(매출(CI) 전표에는 매출 세금코드[taxtyp=S]를 선택하세요)");
                        closeModal(); return;
                    }
                    if (doctyp === 'SI' && taxtyp !== 'P' && taxtyp !== 'D') {
                        alert("선택하신 tax code가 매입 또는 매출 관련 여부인지 확인하세요.\n(매입(SI) 전표에는 매입 세금코드[taxtyp=P 또는 D]를 선택하세요)");
                        closeModal(); return;
                    }
                }
                document.getElementById('h-taxinfo').value = `${c} : ${n}`;
                document.getElementById('h-taxinfo').dataset.txgubun = txgubun;
                document.getElementById('h-taxinfo').dataset.taxrate  = taxrate;
                document.getElementById('taxinfo-container').classList.remove('border-red-500','ring-1','ring-red-500','bg-red-50');
                onTaxCodeSelected(c, n, txgubun, taxrate);
            } else if(currentSearchType === 'glmaster' && activeLineBtn) {
                const tr = activeLineBtn.closest('tr');
                if (tr.dataset.glLocked === 'true') { closeModal(); return; }
                tr.querySelector('.line-gl').value = c;
                tr.querySelector('.line-glname').value = n;
                tr.querySelector('.gl-container').classList.remove('bg-red-50', 'border-red-500', 'ring-1', 'ring-red-500');
                tr.querySelector('.gl-container').classList.add('bg-white');
                const dueInput = tr.querySelector('.line-duedt');
                if(['C','S'].includes(t)) { dueInput.disabled = false; dueInput.classList.remove('disabled-input'); }
                else { dueInput.disabled = true; dueInput.classList.add('disabled-input'); dueInput.value = ''; }
                markEdit();
            }
            closeModal();
        }
        async function applyBizptGl(bizptcd) { const doctyp = document.getElementById('h-doctyp').value; const targetType = doctyp === 'CI' ? 'AR' : doctyp === 'SI' ? 'AP' : null; if (!targetType) return; try { const res = await fetch(`${API_BASE}/bizpt-gl?bizptcd=${encodeURIComponent(bizptcd)}`); if (!res.ok) return; const data = await res.json(); const glCode = doctyp === 'CI' ? data.custgl : data.suppgl; const glName = doctyp === 'CI' ? data.custgl_nm : data.suppgl_nm; if (!glCode) return; document.querySelectorAll('#journal-tbody tr').forEach(tr => { if (tr.dataset.aiType !== targetType) return; const glInput = tr.querySelector('.line-gl'); const glNameInput = tr.querySelector('.line-glname'); const glContainer = tr.querySelector('.gl-container'); const searchBtn = glContainer ? glContainer.querySelector('button') : null; glInput.value = glCode; glNameInput.value = glName; glContainer.classList.remove('bg-red-50', 'border-red-500', 'ring-1', 'ring-red-500'); glContainer.classList.add('bg-white'); glInput.classList.add('biz-gl-locked'); glNameInput.classList.add('biz-gl-locked'); if (searchBtn) { searchBtn.disabled = true; searchBtn.classList.add('biz-gl-locked-btn'); } tr.dataset.glLocked = 'true'; }); } catch(e) { console.warn('거래처 기본 계정 조회 실패:', e); } }
        loadDbPatterns();
    </script>
</body>
